<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copilot Cowork Demo - Click Path Guide</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --highlight: #533483;
    --purple: #7b2ff7;
    --blue: #0078d4;
    --green: #107c10;
    --orange: #ff8c00;
    --red: #d13438;
    --text: #e0e0e0;
    --text-dim: #9a9ab0;
    --text-bright: #ffffff;
    --border: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* Top bar */
  .topbar {
    background: linear-gradient(135deg, var(--accent), var(--highlight));
    padding: 20px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .topbar h1 { font-size: 22px; font-weight: 600; color: #fff; }
  .topbar .subtitle { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  /* Progress bar */
  .progress-track {
    display: flex;
    gap: 0;
    padding: 0 40px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .progress-step {
    padding: 12px 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .progress-step:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .progress-step.active { color: var(--purple); border-bottom-color: var(--purple); }
  .progress-step .step-num {
    display: inline-block;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-dim);
    text-align: center;
    line-height: 20px;
    font-size: 11px;
    margin-right: 6px;
    transition: all 0.2s;
  }
  .progress-step.active .step-num { background: var(--purple); color: #fff; }
  .progress-step.done .step-num { background: var(--green); color: #fff; }
  .progress-step.done { color: var(--green); }

  /* Main content area */
  .main { max-width: 960px; margin: 0 auto; padding: 30px 20px; }

  /* Section (one per demo step) */
  .demo-section {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .demo-section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 4px;
  }
  .card h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 8px;
  }
  .card .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .tag-scene { background: rgba(123,47,247,0.2); color: #b380ff; }
  .tag-prompt { background: rgba(0,120,212,0.2); color: #60b5ff; }
  .tag-action { background: rgba(16,124,16,0.2); color: #6ccf6c; }
  .tag-value { background: rgba(255,140,0,0.2); color: #ffb84d; }

  /* Scene header */
  .scene-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .scene-number {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .scene-title { font-size: 22px; font-weight: 700; color: var(--text-bright); }
  .scene-time { font-size: 13px; color: var(--text-dim); }

  /* Narrative text */
  .narrative {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 16px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--purple);
    border-radius: 0 8px 8px 0;
  }
  .narrative strong { color: var(--text-bright); }

  /* Talk track */
  .talk-track {
    font-size: 14px;
    color: #c0b0e0;
    font-style: italic;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: rgba(123,47,247,0.06);
    border-radius: 8px;
    border: 1px solid rgba(123,47,247,0.15);
  }
  .talk-track::before {
    content: '🎙️ ';
  }

  /* Prompt box */
  .prompt-box {
    background: #0d1b2a;
    border: 1px solid var(--blue);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
  }
  .prompt-box .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .prompt-box .prompt-text {
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    color: #e8e8e8;
    line-height: 1.5;
    cursor: pointer;
  }
  .prompt-box .copy-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 11px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .prompt-box .copy-btn:hover { opacity: 1; }

  /* Where to navigate */
  .nav-where {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(16,124,16,0.08);
    border: 1px solid rgba(16,124,16,0.2);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .nav-where .icon { font-size: 16px; }
  .nav-where strong { color: #6ccf6c; }

  /* Expected output */
  .expected {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border: 1px dashed var(--border);
  }
  .expected::before { content: '✅ Expected: '; color: var(--green); font-weight: 600; }

  /* Business value callout */
  .biz-value {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    background: linear-gradient(135deg, rgba(255,140,0,0.08), rgba(255,140,0,0.03));
    border: 1px solid rgba(255,140,0,0.2);
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .biz-value .icon { font-size: 24px; flex-shrink: 0; }
  .biz-value .text { font-size: 13px; color: #ffc373; }
  .biz-value .text strong { color: #ffd699; }

  /* Data available sidebar */
  .data-available {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .data-available summary {
    cursor: pointer;
    font-weight: 600;
    color: var(--text);
    padding: 6px 0;
  }
  .data-available ul {
    margin: 6px 0 0 18px;
    list-style: disc;
  }
  .data-available li { margin-bottom: 3px; }

  /* Navigation buttons */
  .nav-btns {
    display: flex;
    justify-content: space-between;
    padding: 20px 0;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  .nav-btn {
    padding: 10px 28px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn.prev { background: var(--accent); color: var(--text); }
  .nav-btn.prev:hover { background: #1a4080; }
  .nav-btn.next { background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; }
  .nav-btn.next:hover { filter: brightness(1.15); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Alt prompt */
  .alt-prompts {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .alt-prompts strong { color: var(--text); display: block; margin-bottom: 4px; }
  .alt-prompts code {
    display: block;
    padding: 4px 8px;
    margin: 4px 0;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    color: #c0c0c0;
    cursor: pointer;
  }
  .alt-prompts code:hover { background: rgba(0,0,0,0.5); }

  /* Persona badge */
  .persona {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(0,120,212,0.15);
    color: #60b5ff;
    margin-bottom: 12px;
  }

  /* Tip box */
  .tip {
    font-size: 12px;
    color: #a0c4ff;
    padding: 8px 12px;
    background: rgba(0,120,212,0.06);
    border-radius: 6px;
    border: 1px solid rgba(0,120,212,0.15);
    margin-bottom: 12px;
  }
  .tip::before { content: '💡 Tip: '; font-weight: 600; }

  /* Responsive */
  @media (max-width: 768px) {
    .topbar { padding: 16px 20px; }
    .progress-track { padding: 0 10px; }
    .progress-step { padding: 10px 12px; font-size: 11px; }
    .main { padding: 20px 12px; }
  }
</style>
</head>

// ── Render ──
function renderProgress() {
  const track = document.getElementById('progressTrack');
  track.innerHTML = STEPS.map((s, i) => `
    <div class="progress-step ${i === currentStep ? 'active' : (i < currentStep ? 'done' : '')}"
         onclick="goTo(${i})">
      <span class="step-num">${i < currentStep ? '✓' : i}</span>${s.icon} ${s.title}
    </div>`).join('');
}

function renderSection(stepIdx) {
  const step = STEPS[stepIdx];
  let html = `<div class="demo-section active">`;

  // Scene header
  html += `<div class="scene-header">
    <div class="scene-number">${stepIdx}</div>
    <div>
      <div class="scene-title">${step.icon} ${step.title}</div>
      <div class="scene-time">${step.time}</div>
    </div>
  </div>`;

  for (const s of step.sections) {
    switch (s.type) {
      case 'narrative':
        html += `<div class="narrative">${s.text}</div>`;
        break;
      case 'talk-track':
        html += `<div class="talk-track">${s.text}</div>`;
        break;
      case 'nav':
        html += `<div class="nav-where"><span class="icon">📍</span>${s.text}</div>`;
        break;
      case 'prompt':
        html += `<div class="prompt-box">
          <div class="label">${s.label}</div>
          <div class="prompt-text" onclick="copyPrompt(this)" title="Click to copy">${s.text}</div>
          <button class="copy-btn" onclick="copyPrompt(this.previousElementSibling)">Copy</button>
        </div>`;
        break;
      case 'expected':
        html += `<div class="expected">${s.text}</div>`;
        break;
      case 'value':
        html += `<div class="biz-value"><div class="icon">💰</div><div class="text">${s.text}</div></div>`;
        break;
      case 'tip':
        html += `<div class="tip">${s.text}</div>`;
        break;
      case 'card':
        html += `<div class="card"><h3>${s.title}</h3>${s.html}</div>`;
        break;
      case 'alt-prompts':
        html += `<div class="alt-prompts"><strong>Alternative prompts to try:</strong>`;
        for (const p of s.prompts) {
          html += `<code onclick="copyPrompt(this)" title="Click to copy">${p}</code>`;
        }
        html += `</div>`;
        break;
      case 'data-available':
        html += `<details class="data-available"><summary>📂 ${s.title}</summary><ul>`;
        for (const item of s.items) {
          html += `<li>${item}</li>`;
        }
        html += `</ul></details>`;
        break;
    }
  }

  // Nav buttons
  html += `<div class="nav-btns">
    <button class="nav-btn prev" onclick="goTo(${stepIdx - 1})" ${stepIdx === 0 ? 'disabled' : ''}>← Previous</button>
    <button class="nav-btn next" onclick="goTo(${stepIdx + 1})" ${stepIdx === STEPS.length - 1 ? 'disabled' : ''}>Next Step →</button>
  </div>`;

  html += `</div>`;
  document.getElementById('mainContent').innerHTML = html;
}

let currentStep = 0;

function goTo(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  currentStep = idx;
  renderProgress();
  renderSection(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyPrompt(el) {
  const text = el.textContent || el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.style.color;
    el.style.color = '#6ccf6c';
    setTimeout(() => { el.style.color = orig; }, 600);
  });
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentStep + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(currentStep - 1);
});

// Init
renderProgress();
renderSection(0);
</script>
